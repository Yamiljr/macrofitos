    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header>

        <h1>Macrófitos Ibéricos</h1>

        <p>
            Fotografías e información sobre plantas acuáticas

    </footer>

    <!-- Librería para leer el CSV de Google Sheets -->

    <script src="script.js"></script>
